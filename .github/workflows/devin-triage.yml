name: Devin Issue Triage

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  triage:
    if: github.event.label.name == 'devin-triage'
    runs-on: ubuntu-latest
    steps:
      - name: Start Devin Triage Session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO: ${{ github.repository }}
          PLAYBOOK_ID: ${{ vars.TRIAGE_PLAYBOOK_ID }}
        run: |
          # Safely construct JSON payload using jq --arg (handles all special chars)
          PAYLOAD=$(jq -n \
            --arg issue_num "$ISSUE_NUMBER" \
            --arg title "$ISSUE_TITLE" \
            --arg url "$ISSUE_URL" \
            --arg body "$ISSUE_BODY" \
            --arg repo "$REPO" \
            --arg playbook_id "$PLAYBOOK_ID" \
            '{
              prompt: ("Triage GitHub issue #" + $issue_num + " in the " + $repo + " repository. Issue title: " + $title + ". Issue URL: " + $url + ". Issue body: " + $body + ". Follow the Triage Playbook."),
              playbook_id: $playbook_id,
              tags: [("github-issue-" + $issue_num), "phase:triage"]
            }')

          # Start Devin triage session (v3 API)
          RESPONSE=$(curl -s -X POST "https://api.devin.ai/v3/organizations/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SESSION_URL=$(echo "$RESPONSE" | jq -r '.url // empty')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id // empty')

          # Log full response for debugging if session creation failed
          if [ -z "$SESSION_ID" ]; then
            echo "::error::Devin API did not return a session. Full response:"
            echo "$RESPONSE" | jq .
            exit 1
          fi

          echo "Session ID: $SESSION_ID"
          echo "Session URL: $SESSION_URL"

          # Post session link as GitHub comment
          COMMENT_BODY=$(jq -n --arg url "$SESSION_URL" '{body: ("🔍 Devin is triaging this issue.\n\nSession: " + $url)}')
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "$COMMENT_BODY"
