name: Devin Issue Triage

on:
  issues:
    types: [labeled]

jobs:
  triage:
    if: github.event.label.name == 'devin-triage'
    runs-on: ubuntu-latest
    steps:
      - name: Start Devin Triage Session
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE=$(echo '${{ toJSON(github.event.issue.title) }}' | jq -r '.')
          ISSUE_URL="${{ github.event.issue.html_url }}"
          ISSUE_BODY=$(echo '${{ toJSON(github.event.issue.body) }}' | jq -r '.')
          REPO="${{ github.repository }}"

          # Safely construct JSON payload using jq
          PAYLOAD=$(jq -n \
            --arg prompt "Triage GitHub issue #${ISSUE_NUMBER} in the ${REPO} repository. Issue title: ${ISSUE_TITLE}. Issue URL: ${ISSUE_URL}. Issue body: ${ISSUE_BODY}. Follow the Triage Playbook." \
            --arg playbook_id "${{ vars.TRIAGE_PLAYBOOK_ID }}" \
            --arg num "$ISSUE_NUMBER" \
            '{
              prompt: $prompt,
              playbook_id: $playbook_id,
              tags: [("github-issue-" + $num), "phase:triage"]
            }')

          # Start Devin triage session (v3 API)
          RESPONSE=$(curl -s -X POST "https://api.devin.ai/v3/organizations/sessions" \
            -H "Authorization: Bearer $DEVIN_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          SESSION_URL=$(echo $RESPONSE | jq -r '.url')
          SESSION_ID=$(echo $RESPONSE | jq -r '.session_id')

          echo "Session ID: $SESSION_ID"
          echo "Session URL: $SESSION_URL"

          # Post session link as GitHub comment
          COMMENT_BODY=$(jq -n --arg url "$SESSION_URL" '{body: ("Devin is triaging this issue. Session: " + $url)}')
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
            -d "$COMMENT_BODY"
